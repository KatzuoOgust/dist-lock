<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#f8f9fa" rx="10"/>
  
  <!-- Lock body -->
  <rect x="60" y="85" width="80" height="75" fill="none" stroke="#0066cc" stroke-width="6" rx="4"/>
  
  <!-- Lock shackle (curved top) -->
  <path d="M 70 85 Q 70 30 100 30 Q 130 30 130 85" fill="none" stroke="#0066cc" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Lock keyhole circle -->
  <circle cx="100" cy="110" r="12" fill="none" stroke="#0066cc" stroke-width="5"/>
  
  <!-- Lock keyhole stem -->
  <rect x="97" y="120" width="6" height="25" fill="#0066cc" rx="3"/>
  
  <!-- Distributed nodes - connecting lines -->
  <circle cx="40" cy="30" r="8" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="160" cy="30" r="8" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="100" cy="15" r="8" fill="#ff6b6b" opacity="0.7"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="23" x2="70" y2="75" stroke="#ffd43b" stroke-width="2" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="23" x2="130" y2="75" stroke="#ffd43b" stroke-width="2" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="40" y1="38" x2="75" y2="80" stroke="#ffd43b" stroke-width="2" opacity="0.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="38" x2="125" y2="80" stroke="#ffd43b" stroke-width="2" opacity="0.5" stroke-dasharray="4,4"/>
</svg>
